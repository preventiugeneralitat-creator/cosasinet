            --bg-color: #f8f9fa;
            --text-color: #333;

            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {

            background: white;

            border-radius: 10px;

        h1 {

            text-align: center;
            margin-bottom: 30px;
        }

        .control-panel {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        select {

            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            background-color: white;
            color: var(--text-color);
            cursor: pointer;
            outline: none;
            transition: border-color 0.3s;
            width: 100%;
            max-width: 600px;
        }

        select:focus {
            border-color: var(--accent-color);
        }

        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            font-weight: 600;
            white-space: nowrap;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #e8f4f8;
        }

        .no-data {
            text-align: center;
            color: #7f8c8d;
            font-style: italic;
            padding: 40px;

        function mostrarDatos() {
            const select = document.getElementById("centroSelect");
            const centroSeleccionado = select.value;
            const contenedor = document.getElementById("table-container");

            if (!centroSeleccionado) {
                contenedor.innerHTML = '<div class="no-data">Por favor, selecciona un centro en el menú superior para ver sus datos.</div>';
                return;
            }

            const csvData = basesDeDatos[centroSeleccionado];
            
            if (csvData) {
                contenedor.innerHTML = generarTablaCSV(csvData);
            } else {
                contenedor.innerHTML = '<div class="no-data">No se encontraron datos para este centro.</div>';
            }
        }

        // Función auxiliar para convertir formato científico (2,53E+11) a entero
        function formatSACE(valor) {
            if (!valor) return '';
            // Reemplazar coma por punto para que JS lo entienda como número
            let limpio = valor.toString().replace(',', '.');
            let num = Number(limpio);
            
            // Si es un número válido, lo devolvemos como entero (sin decimales ni formato E)
            if (!isNaN(num)) {
                return BigInt(Math.round(num)).toString();
            }
            return valor; // Si no es número, devolver original
        }

        function generarTablaCSV(csvString) {
            const filas = csvString.trim().split('\n');
            if (filas.length === 0) return '';

            let html = '<table>';
            const cabeceras = filas[0].split(';');
            
            // Buscamos el índice de la columna SACE
            const saceIndex = cabeceras.findIndex(h => h.trim().toUpperCase() === 'SACE');

            html += '<thead><tr>';
            cabeceras.forEach(cabecera => {
                html += `<th>${cabecera.trim()}</th>`;
            });
            html += '</tr></thead>';

            html += '<tbody>';
            for (let i = 1; i < filas.length; i++) {
                if (filas[i].trim() === '') continue; 
                const columnas = filas[i].split(';');
                html += '<tr>';
                for(let j = 0; j < cabeceras.length; j++) {
                    let valorCelda = columnas[j] ? columnas[j].trim() : '';
                    
                    // Aplicar formato especial si es la columna SACE
                    if (j === saceIndex) {
                        valorCelda = formatSACE(valorCelda);
                    }
                    
                    html += `<td>${valorCelda}</td>`;
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            return html;
        }
