<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio en Construcción</title>
    <style>
        /* --- ESTILOS GENERALES --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Evita barras de desplazamiento */
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #121212; /* Fondo gris muy oscuro */
            color: #E0E0E0; /* Texto gris claro */
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .container {
            padding: 20px;
            max-width: 600px;
            animation: fadeIn 2s ease-in-out; /* Animación de entrada */
        }

        /* --- TÍTULO PRINCIPAL (Elegante y con espaciado) --- */
        h1 {
            font-size: 3rem;
            font-weight: 200; /* Fino */
            text-transform: uppercase;
            letter-spacing: 8px; /* Mucho espacio entre letras */
            margin-bottom: 10px;
            color: #C0C0C0; /* Plata mate */
        }

        /* --- LÍNEA DIVISORIA (Toque dorado) --- */
        .divider {
            width: 80px;
            height: 1px;
            background: linear-gradient(to right, transparent, #D4AF37, transparent); /* Degradado dorado */
            margin: 25px auto;
        }

        /* --- SUBTÍTULO (Descripción) --- */
        p {
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.6;
            letter-spacing: 1px;
            color: #A0A0A0;
            margin-bottom: 30px;
        }

        /* --- ANIMACIÓN DE ENTRADA --- */
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* --- RESPONSIVE (Ajustes para móviles) --- */
        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
                letter-spacing: 4px;
            }
            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>EN CONSTRUCCIÓN</h1>
        <div class="divider"></div>
        <p>Estamos trabajando en algo excepcional. Pronto estaremos online con una nueva experiencia digital.</p>
    </div>

</body>
</html>
